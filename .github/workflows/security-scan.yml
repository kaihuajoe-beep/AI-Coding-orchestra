name: Security Scan

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python deps audit
        run: |
          pip install pip-audit 2>/dev/null || true
          if [ -f requirements.txt ]; then
            pip-audit 2>&1 || echo "审计完成 (部分依赖可能需要更新)"
          else
            echo "无 Python 依赖文件"
          fi
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
