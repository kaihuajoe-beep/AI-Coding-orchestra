name: Weekly Patrol

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - name: Weekly Check
        run: |
          echo "# Weekly Patrol $(date +%Y-%m-%d)" > weekly-report.md
          TODO_COUNT=$(grep -rn "TODO\|FIXME\|HACK" --include="*.py" --include="*.md" . 2>/dev/null | wc -l | tr -d ' ')
          echo "Tech debt markers: $TODO_COUNT" >> weekly-report.md
          echo "" >> weekly-report.md
          echo "### Recent commits" >> weekly-report.md
          git log --since="7 days ago" --oneline >> weekly-report.md 2>/dev/null || echo "No commits" >> weekly-report.md
          cat weekly-report.md
      - name: Create Issue if needed
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODO_COUNT=$(grep -rn "TODO\|FIXME\|HACK" --include="*.py" --include="*.md" . 2>/dev/null | wc -l | tr -d ' ')
          if [ "$TODO_COUNT" -gt 10 ]; then
            gh issue create --title "Tech debt: $TODO_COUNT items" --body "See weekly patrol report" --label "tech-debt" 2>/dev/null || true
          fi
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-$(date +%Y%m%d)
          path: weekly-report.md
