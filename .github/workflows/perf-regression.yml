name: ⚡ 性能回归

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装依赖
        run: |
          if [ -f package.json ]; then npm ci; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 运行基准测试
        run: |
          echo "### ⚡ 性能基准测试" > benchmark-report.md
          echo "" >> benchmark-report.md

          if [ -f package.json ]; then
            # Node.js 基准
            if grep -q "benchmark" package.json; then
              npm run benchmark 2>&1 | tee benchmark-output.txt
            elif grep -q "\"benny\"" package.json || grep -q "\"benchmark\"" package.json; then
              node benchmark.js 2>&1 | tee benchmark-output.txt
            else
              echo "⚠️ 未配置基准测试" >> benchmark-report.md
            fi
          elif [ -f requirements.txt ]; then
            # Python 基准 (pytest-benchmark)
            if pip show pytest-benchmark > /dev/null 2>&1; then
              pytest --benchmark-only --benchmark-json=benchmark.json 2>&1 | tee benchmark-output.txt
            else
              echo "⚠️ 未配置基准测试 (pip install pytest-benchmark)" >> benchmark-report.md
            fi
          fi

      - name: 对比基线
        run: |
          if [ -f benchmark-output.txt ]; then
            cat benchmark-output.txt >> benchmark-report.md
          fi

          # 检测退化
          if [ -f .benchmarks/baseline.json ] && [ -f benchmark.json ]; then
            python3 -c "
import json
with open('.benchmarks/baseline.json') as f:
    baseline = json.load(f)
with open('benchmark.json') as f:
    current = json.load(f)

# 简单退化检测
for bench in current.get('benchmarks', []):
    name = bench.get('name', 'unknown')
    cur_mean = bench.get('stats', {}).get('mean', 0)
    base = next((b for b in baseline.get('benchmarks', []) if b.get('name')==name), None)
    if base:
        base_mean = base.get('stats', {}).get('mean', 0)
        if base_mean > 0:
            change = (cur_mean - base_mean) / base_mean * 100
            level = '🔴' if change > 10 else ('🟡' if change > 5 else '🟢')
            print(f'{level} {name}: {change:+.1f}% (baseline:{base_mean:.3f}s, current:{cur_mean:.3f}s)')
"
          fi

      - name: 阻塞或更新基线
        if: github.event_name == 'pull_request'
        run: |
          # 简单检查: 如果有benchmark退化, 在PR中评论
          if [ -f benchmark-report.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "$(cat benchmark-report.md)" 2>/dev/null || true
          fi

      - name: 更新基线 (仅 main 分支合并后)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .benchmarks
          if [ -f benchmark.json ]; then
            cp benchmark.json .benchmarks/baseline.json
            git config user.name "AI Orchestra"
            git config user.email "orchestra@ai.local"
            git add .benchmarks/baseline.json
            git commit -m "chore: update performance baseline" || true
          fi

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark-report.md
